name: Tests

on: [push, pull_request]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [25.x]

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version-file: "pyproject.toml"

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: latest

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'

    - name: Install node dependencies
      run: pnpm install

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Install python dependencies
      run: uv sync

    - name: Install Qt dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
             libegl1-mesa-dev   \
             libx11-6           \
             libxcb-cursor0     \
             libxcb-icccm4      \
             libxcb-keysyms1    \
             libxcb-shape0      \
             libxcb-xkb1        \
             libxcb1            \
             libxext6           \
             libxfixes3         \
             libxkbcommon-x11-0 \
             libxkbcommon0      \
             libxrender1        \
             xvfb

    - name: Lint with Ruff
      run: uv run ruff check --output-format github

    - name: Lint with eslint
      run: pnpm gulp lint_eslint

    - name: Lint with htmlhint
      run: pnpm gulp lint_htmlhint

    - name: Lint with stylelint
      run: pnpm gulp lint_stylelint

    - name: Lint with zmypy
      run: uv run zmypy

    - name: Build TypeScript
      run: pnpm gulp build_ts

    - name: Build
      run: pnpm gulp build_quick

    - name: Test with pytest
      run: xvfb-run --auto-servernum uv run pytest -v --cov dist/ --cov-report=html

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage
        path: htmlcov/

    - name: Export zip file
      run: pnpm gulp export_zip

    - name: Upload zip package
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: ankiwanikanisync.zip
        compression-level: 0
